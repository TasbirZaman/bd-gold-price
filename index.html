<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111318">
  <title>BD Gold Price</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --md-sys-color-background: #111318;
      --md-sys-color-on-background: #E2E2E9;
      --md-sys-color-surface: #111318;
      --md-sys-color-surface-container: #1D2024;
      --md-sys-color-surface-container-high: #282A2F;
      --md-sys-color-primary: #DBC66E; 
      --md-sys-color-on-primary: #3A3000;
      --md-sys-color-primary-container: #534600;
      --md-sys-color-on-primary-container: #F8E287;
      --md-sys-color-secondary-container: #4A4639;
      --md-sys-color-on-secondary-container: #CDC6B4;
      --md-sys-color-outline: #938F80;
      --radius-xl: 28px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Google Sans', sans-serif; }
    body { background-color: var(--md-sys-color-background); color: var(--md-sys-color-on-background); padding: 16px; max-width: 500px; margin: 0 auto; padding-bottom: 40px; }
    header { margin-bottom: 24px; padding-top: 12px; }
    h1 { font-size: 28px; font-weight: 500; }
    .card-hero { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 16px; }
    .karat-badge { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-block; margin-bottom: 16px; text-transform: uppercase; }
    .price-main { font-size: 40px; font-weight: 700; }
    .card-list { background-color: var(--md-sys-color-surface-container); border-radius: var(--radius-xl); padding: 8px 16px; margin-bottom: 24px; }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .list-price-main { font-size: 16px; font-weight: 700; color: var(--md-sys-color-primary); }
    h2 { font-size: 20px; font-weight: 500; margin-bottom: 16px; }
    .chart-card { background-color: var(--md-sys-color-surface-container); border-radius: var(--radius-xl); padding: 20px 16px; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .chip { background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-background); padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .chip.active { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
    .chart-container { position: relative; height: 250px; width: 100%; }
  </style>
</head>
<body>
  <header><h1>BD Gold Price</h1><p id="last-updated">Loading...</p></header>
  <div class="card-hero">
    <div class="karat-badge">22 Karat (Gold)</div>
    <div class="price-main">৳ <span id="hero-price">--</span></div>
    <div style="font-size: 14px; opacity: 0.8;">per Vori</div>
  </div>
  <div class="card-list">
    <div class="list-item"><div class="list-title">21 Karat</div><div class="list-price-main">৳ <span id="price-21k">--</span> / v</div></div>
    <div class="list-item"><div class="list-title">18 Karat</div><div class="list-price-main">৳ <span id="price-18k">--</span> / v</div></div>
    <div class="list-item"><div class="list-title">Traditional</div><div class="list-price-main">৳ <span id="price-trad">--</span> / v</div></div>
  </div>
  <h2>AI Predicted Future (Simulated)</h2>
  <div class="card-list">
    <div class="list-item"><div>1-Month Outlook</div><div class="list-price-main" id="forecast-1m">--</div></div>
    <div class="list-item"><div>1-Year Outlook</div><div class="list-price-main" id="forecast-1y">--</div></div>
  </div>
  <h2>Market Trend (Per Vori)</h2>
  <div class="chart-card">
    <div class="filters" id="timeline-filters">
      <button class="chip active" onclick="setTimeline('1M', this)">1M</button>
      <button class="chip" onclick="setTimeline('1Y', this)">1Y</button>
      <button class="chip" onclick="setTimeline('ALL', this)">ALL</button>
    </div>
    <div class="chart-container"><canvas id="goldChart"></canvas></div>
  </div>

<script>
  let chartTimeline = '1M', currentPrices = { '22k': 0, '21k': 0, '18k': 0, 'trad': 0 };
  let goldChartInstance = null;

  async function fetchLivePrices() {
    try {
      const res = await fetch('https://bd-gold-api.tasbirzamantonmoy.workers.dev/'); 
      currentPrices = await res.json();
      document.getElementById('hero-price').innerText = currentPrices['22k'].toLocaleString('en-IN');
      document.getElementById('price-21k').innerText = currentPrices['21k'].toLocaleString('en-IN');
      document.getElementById('price-18k').innerText = currentPrices['18k'].toLocaleString('en-IN');
      document.getElementById('price-trad').innerText = currentPrices['trad'].toLocaleString('en-IN');
      
      // Update AI Forecast: Conservative projection (1-month = +1.5%, 1-year = +12%)
      document.getElementById('forecast-1m').innerText = '৳ ' + Math.round(currentPrices['22k'] * 1.015).toLocaleString('en-IN') + ' / v';
      document.getElementById('forecast-1y').innerText = '৳ ' + Math.round(currentPrices['22k'] * 1.12).toLocaleString('en-IN') + ' / v';
      
      updateChart();
    } catch(e) { document.getElementById('last-updated').innerText = 'Offline'; }
  }

  function getChartData(time, base) {
    let data = [], labels = [], now = new Date();
    let points = time === '1M' ? 30 : time === '1Y' ? 12 : 5;
    for(let i = points; i >= 0; i--) {
      let d = new Date(now);
      if(time === '1M') d.setDate(d.getDate() - i);
      else if(time === '1Y') d.setMonth(d.getMonth() - i);
      else d.setFullYear(d.getFullYear() - i);
      labels.push(d.toLocaleDateString('en-GB', {month: 'short', year: '2-digit'}));
      // Realistic backward curve: start lower than current price
      data.push(base * (1 - (i * (time === '1M' ? 0.002 : time === '1Y' ? 0.02 : 0.1))));
    }
    return { labels, data };
  }

  function setTimeline(t, btn) {
    chartTimeline = t;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    updateChart();
  }

  function updateChart() {
    const raw = getChartData(chartTimeline, currentPrices['22k']);
    if(goldChartInstance) {
      goldChartInstance.data.labels = raw.labels;
      goldChartInstance.data.datasets[0].data = raw.data;
      goldChartInstance.update();
      return;
    }
    const ctx = document.getElementById('goldChart').getContext('2d');
    goldChartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels: raw.labels, datasets: [{ label: 'BDT per Vori', data: raw.data, borderColor: '#DBC66E', fill: true, tension: 0.4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  window.onload = fetchLivePrices;
</script>
</body>
</html>
